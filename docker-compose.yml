version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goodzz-app
    ports:
      - "3300:3300"
    env_file:
      - .env
    depends_on:
      - minio
    networks:
      - goodzz-network

  minio:
    image: minio/minio:latest
    container_name: goodzz-storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - goodzz-network

  # Optional: Create bucket automatically
  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    networks:
      - goodzz-network
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadminpassword;
      /usr/bin/mc mb myminio/goodzz;
      /usr/bin/mc anonymous set public myminio/goodzz;
      exit 0;
      "

networks:
  goodzz-network:
    driver: bridge

volumes:
  minio_data:
